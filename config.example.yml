# 1NCE SIM Usage Checker – Organisation Configuration
#
# Copy this file to config.yml and fill in your organisation details.
# config.yml is gitignored – credentials are never committed.
#
# You can also manage organisations through the web UI (Add / Edit buttons).
# The UI never sends passwords to the browser; they stay server-side only.

organizations:
  - id: "abc12345"
    name: "ACME GmbH"
    customer_number: "10012345"
    username: "admin@acme.example.com"
    password: "super-secret-password"

  - id: "def67890"
    name: "Second Org"
    customer_number: "20067890"
    username: "admin@second.example.com"
    password: "another-secret"
