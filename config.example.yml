# 1NCE SIM Usage Checker – Organisation Configuration
#
# Copy this file to config.yml and fill in your organisation details.
# config.yml is gitignored – credentials are never committed.
#
# You can also manage organisations through the web UI (Add / Edit buttons).
# The UI never sends passwords to the browser; they stay server-side only.

organizations:
  - id: "abc12345"                      # auto-generated – do not edit manually
    name: "ACME GmbH"                   # display name shown in the UI
    customer_number: "10012345"         # your 1NCE customer number
    username: "admin@acme.example.com"  # 1NCE portal login email
    password: "super-secret-password"   # 1NCE portal password
    portal_url_template: ""             # leave blank for default:
    # default = https://api.1nce.com/management-api/v1/sims/{iccid}
    # Use {iccid} and {customer_number} as placeholders if you customise this.

  - id: "def67890"
    name: "Second Org"
    customer_number: "20067890"
    username: "admin@second.example.com"
    password: "another-secret"
    portal_url_template: ""
