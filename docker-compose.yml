services:
  app:
    build: .
    ports:
      - "${PORT:-4567}:4567"
    volumes:
      # Mount your local config.yml into the container (created from config.example.yml).
      # The file is created on first run if it does not exist yet.
      - ./config.yml:/app/config.yml
    environment:
      - PORT=4567
    restart: unless-stopped
