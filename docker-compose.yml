services:
  app:
    build: .
    ports:
      - "4567:4567"
    volumes:
      # Mount your config.yml into the container.
      # IMPORTANT: create this file first (copy config.example.yml to config.yml)
      # before running docker compose up, otherwise Docker creates it as a directory.
      - type: bind
        source: ./config.yml
        target: /app/config.yml
    restart: unless-stopped
